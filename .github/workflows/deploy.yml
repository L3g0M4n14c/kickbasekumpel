name: Deploy to Firebase & App Distribution

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release Notes für Tester"
        required: false
        default: "Manuelles Deploy von main branch"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Flutter Web bauen (Artefakt für Firebase Hosting)
  # ─────────────────────────────────────────────────────────────────────────────
  build-web:
    name: "Build Flutter Web"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Get packages
        run: flutter pub get

      - name: Generate code (Freezed / build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Web
        run: flutter build web --release

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Firebase Backend deployen (Functions, Firestore, Storage, Hosting)
  # ─────────────────────────────────────────────────────────────────────────────
  firebase-deploy:
    name: "Deploy Firebase Backend + Web Hosting"
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Build Functions (TypeScript)
        working-directory: functions
        run: npm run build

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Löscht Gen-1-Funktionen vor dem Deploy, falls sie noch als Gen 1 in Firebase registriert sind.
      # Notwendig, weil ein direktes In-Place-Upgrade Gen 1 → Gen 2 von Firebase nicht unterstützt wird.
      # "|| true" macht den Schritt idempotent – nach dem ersten erfolgreichen Deploy ist die Gen-1-Instanz
      # nicht mehr vorhanden und der Befehl schlägt harmlos fehl.
      - name: Delete Gen-1 functions (pre-migration, idempotent)
        run: |
          firebase functions:delete getLigainsiderScraperStatus --region us-central1 --project kickbasekumpel --force || true
          firebase functions:delete initializeLigainsiderScraperMetadata --region us-central1 --project kickbasekumpel --force || true
          firebase functions:delete initializeLigainsiderScraperMetadata --region europe-west3 --project kickbasekumpel --force || true

      - name: Deploy to Firebase
        run: firebase deploy --only functions,firestore,storage,hosting --project kickbasekumpel --non-interactive --force

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Android APK bauen und via Firebase App Distribution verteilen
  # ─────────────────────────────────────────────────────────────────────────────
  android-distribute:
    name: "Build & Distribute Android"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Get packages
        run: flutter pub get

      - name: Generate code (Freezed / build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Build APK (Release)
        env:
          ANDROID_KEYSTORE_PATH: keystore.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: flutter build apk --release

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: internal-testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: ${{ github.event.inputs.release_notes || 'Automatisches Deploy von main branch' }}

      - name: Cleanup Keystore
        if: always()
        run: rm -f android/app/keystore.jks

  # iOS-Build läuft via Xcode Cloud (Apple Silicon M-Series, ~10–20 min).
  # Die ci_scripts/ (ci_post_clone.sh, ci_post_xcodebuild.sh) übernehmen
  # Flutter-Setup, Code-Generierung, Pod-Install und Firebase App Distribution.
